services:
  t3code:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-latest}
    restart: unless-stopped
    stop_grace_period: 45s
    environment:
      DATA_ROOT: /data
      T3_DEPLOYMENT_MODE: self-hosted
      T3CODE_HOST: 0.0.0.0
      T3CODE_PORT: "3773"
      T3CODE_NO_BROWSER: "true"
      T3CODE_LOG_WS_EVENTS: ${T3CODE_LOG_WS_EVENTS:-false}
      T3_PUBLIC_BASE_URL: ${T3_PUBLIC_BASE_URL:?Set T3_PUBLIC_BASE_URL in Coolify}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?Set CLERK_SECRET_KEY in Coolify}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?Set CLERK_PUBLISHABLE_KEY in Coolify}
      CLERK_ALLOWED_USER_IDS: ${CLERK_ALLOWED_USER_IDS:-}
      CLERK_ALLOWED_EMAILS: ${CLERK_ALLOWED_EMAILS:-}
      CLERK_ALLOWED_EMAIL_DOMAINS: ${CLERK_ALLOWED_EMAIL_DOMAINS:-}
      T3CODE_POSTHOG_HOST: ${T3CODE_POSTHOG_HOST:-}
    volumes:
      - type: volume
        source: t3code-data
        target: /data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3773/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  t3code-data: {}
